<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shooter — a quick-draw dueling game</title>
<meta name="description" content="SHOOTER is a pixel-art Wild West quick-draw duel. Play solo, local two-player, or online. Free download for Windows, macOS, and Linux.">
<style>
  @font-face {
    font-family: "FreeSansBold";
    src: url("fonts/freesansbold.ttf") format("truetype");
    font-weight: normal;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: #fff;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(10px, 2.5vh, 18px);
    padding: 16px;
    min-height: 100%;
  }

  a { color: #06c; }
  a:hover { color: #000; }

  h1 {
    margin: 0;
    font-size: clamp(34px, 11vw, 60px);
    font-weight: normal;
    letter-spacing: 0.02em;
    font-family: "FreeSansBold", "Arial Black", sans-serif;
    text-shadow: 2px 2px 0 #000;
    animation: title-flash 0.66s steps(1) infinite;
  }

  @keyframes title-flash {
    0%, 49%   { color: rgb(255, 230, 0); }
    50%, 100% { color: rgb(255, 190, 40); }
  }

  @media (prefers-reduced-motion: reduce) {
    h1 { animation: none; color: rgb(255, 230, 0); }
  }

  p.tagline {
    margin: 10px 0 0;
    font-size: clamp(14px, 4vw, 20px);
    color: #444;
  }

  p.description {
    margin: 10px 0 0;
    font-size: clamp(12px, 3.2vw, 14px);
    color: #888;
    max-width: 50ch;
    padding: 0 8px;
  }

  header {
    text-align: center;
    margin-bottom: clamp(20px, 5vw, 36px);
  }

  .carousel {
    position: relative;
    width: min(90vw, 640px);
  }

  .carousel-track {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    border: 1px solid #ddd;
  }

  .carousel-track::-webkit-scrollbar { display: none; }

  .carousel-track img {
    flex: 0 0 100%;
    width: 100%;
    max-height: 48vh;
    object-fit: contain;
    background: #000;
    scroll-snap-align: start;
    display: block;
  }

  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #fff;
    color: #111;
    border: 1px solid #ccc;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .carousel-btn:hover { background: #f0f0f0; }
  .carousel-btn.prev { left: 8px; }
  .carousel-btn.next { right: 8px; }

  .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
  }

  .dots button {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    border: 1px solid #bbb;
    background: transparent;
    padding: 0;
    cursor: pointer;
  }

  .dots button.active { background: #111; border-color: #111; }

  .downloads {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(14px, 4vw, 24px);
    font-size: clamp(15px, 4vw, 19px);
  }

  .downloads a {
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: rgb(210, 100, 30);
  }

  .downloads a:hover {
    color: rgb(160, 70, 15);
  }

  p.version {
    margin: -8px 0 14px;
    text-align: center;
    font-size: 12px;
    color: #999;
  }

  footer {
    font-size: 12px;
    color: #999;
  }

  footer a { color: #0000FF; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

  <header>
    <h1>SHOOTER</h1>
    <p class="tagline">A QUICK-DRAW DUELING GAME</p>
    <p class="description">SHOOTER is a pixel-art Wild West quick-draw duel. Play solo, local two-player, or online. Free download for Windows, macOS, and Linux.</p>
  </header>

  <div class="carousel">
    <div class="carousel-track" id="track">
      <img src="screenshots/shot1.png" alt="SHOOTER title screen">
      <img src="screenshots/shot2.png" alt="Solo duel, waiting on the draw prompt">
      <img src="screenshots/shot3.png" alt="Solo mode new record result screen">
      <img src="screenshots/shot4.png" alt="Local two-player duel, waiting on the draw prompt">
      <img src="screenshots/shot5.png" alt="Local two-player result screen, P1 wins">
    </div>
    <button class="carousel-btn prev" id="prevBtn" aria-label="Previous screenshot">&#10094;</button>
    <button class="carousel-btn next" id="nextBtn" aria-label="Next screenshot">&#10095;</button>
  </div>
  <div class="dots" id="dots"></div>

  <div class="downloads">
    <a href="https://github.com/ev-98/shooter/releases/latest/download/shooter-windows.zip">Windows</a>
    <a href="https://github.com/ev-98/shooter/releases/latest/download/shooter-macos.zip">Mac</a>
    <a href="https://github.com/ev-98/shooter/releases/latest/download/shooter-linux.zip">Linux</a>
  </div>
  <p class="version">Latest build: v1.0.0</p>

  <footer>
    <a href="https://ev4.life/">ev4.life</a>
  </footer>

<script>
  const track = document.getElementById('track');
  const slides = track.querySelectorAll('img');
  const dotsWrap = document.getElementById('dots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.setAttribute('aria-label', 'Go to screenshot ' + (i + 1));
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => scrollToSlide(i));
    dotsWrap.appendChild(dot);
  });
  const dots = dotsWrap.querySelectorAll('button');

  function scrollToSlide(i) {
    track.scrollTo({ left: track.clientWidth * i, behavior: 'smooth' });
  }

  function currentIndex() {
    return Math.round(track.scrollLeft / track.clientWidth);
  }

  track.addEventListener('scroll', () => {
    const i = currentIndex();
    dots.forEach((d, di) => d.classList.toggle('active', di === i));
  });

  prevBtn.addEventListener('click', () => scrollToSlide(Math.max(0, currentIndex() - 1)));
  nextBtn.addEventListener('click', () => scrollToSlide(Math.min(slides.length - 1, currentIndex() + 1)));
</script>

</body>
</html>
